<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>محسوب — تصوير فاتورة</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ced9d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="محسوب">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'PingARLT';src:url('fonts/PingARLT-Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'PingARLT';src:url('fonts/PingARLT-Bold.otf') format('opentype');font-weight:700;font-display:swap}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'PingARLT','Tajawal',sans-serif;
  background:#f3f5f5;color:#155e5f;
  min-height:100vh;display:flex;flex-direction:column;
}

/* Header */
.hdr{background:linear-gradient(120deg,#7fc57b 0%,#a8d39e 45%,#ced9d9 100%);
  padding:18px 22px;display:flex;align-items:center;gap:12px;color:#155e5f;
  border-radius:0 0 22px 22px;box-shadow:0 4px 18px rgba(127,197,123,.18);}
.hdr-logo{width:38px;height:38px;border-radius:11px;background:#fff;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid rgba(21,94,95,.18)}
.hdr-logo img{width:32px;height:32px;object-fit:contain}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:rgba(21,94,95,.7);margin-top:2px}

/* Auth screen */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 22px}
.auth-card{background:#fff;border:1px solid #ced9d9;border-radius:18px;padding:24px 22px;
  width:100%;max-width:380px;box-shadow:0 10px 30px rgba(21,94,95,.06)}
.auth-h{font-size:18px;font-weight:800;color:#155e5f;margin-bottom:6px;text-align:center}
.auth-p{font-size:13px;color:rgba(21,94,95,.7);text-align:center;line-height:1.7;margin-bottom:22px}
.ff{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fl{font-size:12px;color:rgba(21,94,95,.75);font-weight:600}
.fi{background:#f8faf6;border:1.5px solid #ced9d9;border-radius:12px;padding:14px 16px;
  font-size:15px;color:#155e5f;font-family:inherit;outline:none;width:100%;transition:all .2s}
.fi:focus{border-color:#7fc57b;background:#fff;box-shadow:0 0 0 4px rgba(127,197,123,.12)}
.phone-wrap{display:flex;gap:8px}
.phone-prefix{background:#fff;border:1.5px solid #ced9d9;border-radius:12px;padding:14px 13px;
  font-size:15px;color:#155e5f;direction:ltr;font-weight:700;min-width:72px;text-align:center}

.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:inherit;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#ced9d9,#dde5e5);color:#155e5f;
  box-shadow:0 3px 12px rgba(21,94,95,.12)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(21,94,95,.18)}
.btn-primary:disabled{opacity:.6;cursor:wait;transform:none}
.btn-ghost{background:#fff;color:#155e5f;border:1.5px solid #ced9d9;margin-top:10px}

.otp-wrap{display:flex;gap:8px;justify-content:center;margin:8px 0 18px;direction:ltr}
.otp-digit{width:46px;height:54px;background:#f8faf6;border:1.5px solid #ced9d9;border-radius:11px;
  font-size:24px;font-weight:800;text-align:center;outline:none;font-family:inherit;color:#155e5f;
  transition:all .2s}
.otp-digit:focus{border-color:#7fc57b;background:#fff;box-shadow:0 0 0 4px rgba(127,197,123,.12)}

.msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;font-weight:600}
.msg.err{background:rgba(201,53,69,.08);color:#c93545;border:1px solid rgba(201,53,69,.18)}
.msg.suc{background:rgba(127,197,123,.1);color:#155e5f;border:1px solid rgba(127,197,123,.25)}

/* Capture screen */
.cap-wrap{flex:1;display:flex;flex-direction:column;padding:20px 18px;gap:18px}
.cap-user{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ced9d9;
  border-radius:14px;padding:12px 14px}
.cap-user-av{width:36px;height:36px;border-radius:50%;background:rgba(127,197,123,.15);
  color:#155e5f;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.cap-user-info{flex:1;min-width:0}
.cap-user-name{font-size:13px;font-weight:700;color:#155e5f}
.cap-user-meta{font-size:10px;color:rgba(21,94,95,.6);direction:ltr;text-align:right}
.cap-logout{background:none;border:none;color:#c93545;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700}

.cap-main{flex:1;background:#fff;border:1px solid #ced9d9;border-radius:18px;padding:24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  min-height:340px;text-align:center}
.cap-icon{width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,#7fc57b,#a8d39e);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(127,197,123,.3);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.cap-icon svg{width:38px;height:38px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.cap-title{font-size:17px;font-weight:800;color:#155e5f}
.cap-sub{font-size:13px;color:rgba(21,94,95,.7);line-height:1.7;max-width:280px}

.cap-actions{display:flex;flex-direction:column;gap:10px;width:100%}
.cap-btn-big{padding:18px;border-radius:14px;border:none;font-family:inherit;font-size:16px;
  font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.cap-btn-big.primary{background:linear-gradient(135deg,#7fc57b,#a8d39e);color:#fff;
  box-shadow:0 6px 20px rgba(127,197,123,.35)}
.cap-btn-big.primary:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(127,197,123,.45)}
.cap-btn-big.ghost{background:#fff;color:#155e5f;border:1.5px solid #ced9d9}

.cap-note{font-size:13px;color:rgba(21,94,95,.75);margin-top:4px;text-align:center}

/* Preview */
.preview-wrap{display:none;background:#fff;border:1px solid #ced9d9;border-radius:18px;padding:18px;margin-top:14px}
.preview-wrap.on{display:block}
.preview-img{width:100%;border-radius:12px;max-height:280px;object-fit:contain;background:#f3f5f5}
.preview-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.preview-meta input{width:100%}

/* Success state */
.done-state{display:none;text-align:center;padding:30px 20px}
.done-state.on{display:block}
.done-icon{width:88px;height:88px;border-radius:50%;background:rgba(127,197,123,.15);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.done-icon svg{width:42px;height:42px;stroke:#7fc57b;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.done-title{font-size:18px;font-weight:800;color:#155e5f;margin-bottom:6px}
.done-sub{font-size:13px;color:rgba(21,94,95,.7);line-height:1.7}

/* History list */
.history{margin-top:18px}
.history-h{font-size:13px;font-weight:700;color:#155e5f;margin-bottom:8px;display:flex;justify-content:space-between}
.history-item{background:#fff;border:1px solid rgba(206,217,217,.5);border-radius:11px;
  padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:12px}
.history-thumb{width:32px;height:32px;border-radius:8px;object-fit:cover;background:#f3f5f5;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-time{font-size:10px;color:rgba(21,94,95,.6);direction:ltr;text-align:right}
.history-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.history-status.pending{background:rgba(168,133,74,.12);color:#a8854a}
.history-status.approved{background:rgba(127,197,123,.15);color:#155e5f}
.history-status.rejected{background:rgba(201,53,69,.1);color:#c93545}

.hidden{display:none !important}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-logo"><img src="img/logo.png" alt="" onerror="this.style.display='none'"></div>
  <div>
    <div class="hdr-title">تصوير سريع</div>
    <div class="hdr-sub">رفع فواتير الموردين بسهولة</div>
  </div>
</div>

<!-- AUTH STEP 1: Phone -->
<div id="authStep" class="auth-wrap">
  <div class="auth-card">
    <div id="errMsg" class="msg err hidden"></div>
    <div id="sucMsg" class="msg suc hidden"></div>

    <div id="phoneStep">
      <div class="auth-h">دخول السواق / العامل</div>
      <div class="auth-p">سندرسل لك رمز تحقق على رقم جوالك. ما تحتاج إيميل ولا كلمة سر.</div>

      <div class="ff">
        <label class="fl">رقم الجوال</label>
        <div class="phone-wrap">
          <div class="phone-prefix">+966</div>
          <input class="fi" id="phoneIn" type="tel" inputmode="numeric" maxlength="9"
                 placeholder="5xxxxxxxx" dir="ltr" style="flex:1"
                 onkeydown="if(event.key==='Enter')sendOtp()">
        </div>
      </div>

      <button class="btn btn-primary" id="sendBtn" onclick="sendOtp()">إرسال رمز التحقق ←</button>
    </div>

    <div id="otpStep" class="hidden">
      <div class="auth-h">أدخل رمز التحقق</div>
      <div class="auth-p" id="otpHint">—</div>

      <div class="otp-wrap">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,0)">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,1)">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,2)">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,3)">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,4)">
        <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,5)">
      </div>

      <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()">دخول ←</button>
      <button class="btn btn-ghost" onclick="resetOtp()">رجوع</button>
    </div>
  </div>
</div>

<!-- CAPTURE STEP -->
<div id="captureStep" class="cap-wrap hidden">
  <div class="cap-user">
    <div class="cap-user-av" id="userAv">س</div>
    <div class="cap-user-info">
      <div class="cap-user-name" id="userName">—</div>
      <div class="cap-user-meta" id="userPhone">—</div>
    </div>
    <button class="cap-logout" onclick="logout()">خروج</button>
  </div>

  <!-- Main: pick or capture -->
  <div class="cap-main" id="mainPanel">
    <div class="cap-icon">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="cap-title">رفع فاتورة جديدة</div>
    <div class="cap-sub">صوّر الفاتورة أو ارفع صورة من الجوال</div>

    <div class="cap-actions">
      <input type="file" id="filePick" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
      <input type="file" id="filePickGallery" accept="image/*" style="display:none" onchange="handleFile(this)">
      <button class="cap-btn-big primary" onclick="document.getElementById('filePick').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        فتح الكاميرا
      </button>
      <button class="cap-btn-big ghost" onclick="document.getElementById('filePickGallery').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        اختيار من المعرض
      </button>
    </div>
  </div>

  <!-- Preview + submit -->
  <div class="preview-wrap" id="previewPanel">
    <img id="previewImg" class="preview-img" alt="">
    <div class="ff" style="margin-top:14px">
      <label class="fl">المبلغ (اختياري)</label>
      <input class="fi" id="capAmount" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
    </div>
    <div class="ff">
      <label class="fl">ملاحظات (اختياري)</label>
      <input class="fi" id="capNote" placeholder="مثال: بنزين، صيانة، مورد البن...">
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-primary" id="submitBtn" onclick="submitReceipt()" style="flex:2">رفع الفاتورة ✓</button>
      <button class="btn btn-ghost" onclick="resetCapture()" style="flex:1;margin-top:0">إلغاء</button>
    </div>
  </div>

  <!-- Success -->
  <div class="done-state" id="donePanel">
    <div class="done-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="done-title">تم رفع الفاتورة بنجاح</div>
    <div class="done-sub">المدير راح يراجعها ويصنّفها قريباً.</div>
    <button class="btn btn-primary" onclick="resetCapture()" style="margin-top:18px;max-width:240px;margin-left:auto;margin-right:auto">رفع فاتورة ثانية</button>
  </div>

  <!-- Recent uploads -->
  <div class="history" id="historyPanel">
    <div class="history-h">
      <span>📋 آخر رفعاتك</span>
      <span id="histCount" style="color:rgba(21,94,95,.6)">—</span>
    </div>
    <div id="histList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let _phone = '';
let _file = null;
let _userInfo = null;

// ── UI helpers ──────────────────────────────────────────
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = msg; e.classList.remove('hidden'); document.getElementById('sucMsg').classList.add('hidden'); }
function showSuc(msg) { const e = document.getElementById('sucMsg'); e.textContent = msg; e.classList.remove('hidden'); document.getElementById('errMsg').classList.add('hidden'); }
function clearMsgs() { document.getElementById('errMsg').classList.add('hidden'); document.getElementById('sucMsg').classList.add('hidden'); }
function setBtn(id, loading, text) {
  const b = document.getElementById(id); if (!b) return;
  if (loading) { b.dataset.original = b.textContent; b.disabled = true; b.textContent = 'جاري...'; }
  else { b.disabled = false; b.textContent = text || b.dataset.original || b.textContent; }
}

// ── OTP flow (via Authentica Edge Function) ──────────────
async function sendOtp() {
  clearMsgs();
  const raw = document.getElementById('phoneIn').value.trim();
  if (!raw || raw.length < 9) { showErr('أدخل رقم جوال صحيح'); return; }
  _phone = '+966' + raw.replace(/^0/, '');
  setBtn('sendBtn', true);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/auth-send-otp`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body:    JSON.stringify({ phone: _phone, channel: 'sms', context: 'capture' }),
    });
    const data = await res.json();
    setBtn('sendBtn', false, 'إرسال رمز التحقق ←');
    if (!data.success) { showErr(data.error || 'فشل إرسال الرمز'); return; }
    document.getElementById('phoneStep').classList.add('hidden');
    document.getElementById('otpStep').classList.remove('hidden');
    document.getElementById('otpHint').textContent = `أُرسل الرمز إلى ${_phone}`;
    document.querySelectorAll('.otp-digit')[0].focus();
  } catch (e) {
    setBtn('sendBtn', false, 'إرسال رمز التحقق ←');
    showErr('تعذّر الاتصال — حاول مرة أخرى');
  }
}

function otpNext(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 5) document.querySelectorAll('.otp-digit')[idx + 1].focus();
  if (idx === 5 && el.value) verifyOtp();
}

async function verifyOtp() {
  const code = [...document.querySelectorAll('.otp-digit')].map(i => i.value).join('');
  if (code.length < 6) { showErr('أدخل الرمز المكوّن من 6 أرقام'); return; }
  setBtn('verifyBtn', true);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/auth-verify-otp`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body:    JSON.stringify({ phone: _phone, otp: code, context: 'capture' }),
    });
    const data = await res.json();
    setBtn('verifyBtn', false, 'دخول ←');
    if (!data.success || !data.session) { showErr(data.error || 'رمز غير صحيح'); return; }

    // Apply session
    const { error: setErr } = await sb.auth.setSession({
      access_token:  data.session.access_token,
      refresh_token: data.session.refresh_token,
    });
    if (setErr) { showErr('فشل تطبيق الجلسة'); return; }
    _userInfo = data.user;
    showCaptureUI();
  } catch (e) {
    setBtn('verifyBtn', false, 'دخول ←');
    showErr('تعذّر الاتصال — حاول مرة أخرى');
  }
}

function resetOtp() {
  document.getElementById('phoneStep').classList.remove('hidden');
  document.getElementById('otpStep').classList.add('hidden');
  document.querySelectorAll('.otp-digit').forEach(i => i.value = '');
  clearMsgs();
}

// ── Capture flow ─────────────────────────────────────────
async function showCaptureUI() {
  document.getElementById('authStep').classList.add('hidden');
  document.getElementById('captureStep').classList.remove('hidden');
  const name = _userInfo?.user_metadata?.display_name || _userInfo?.phone || _phone;
  document.getElementById('userName').textContent = name;
  document.getElementById('userPhone').textContent = _userInfo?.phone || _phone;
  document.getElementById('userAv').textContent = (name || '?').charAt(0).toUpperCase();
  await loadHistory();
}

function handleFile(input) {
  const f = input.files[0];
  if (!f) return;
  _file = f;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('mainPanel').classList.add('hidden');
    document.getElementById('previewPanel').classList.add('on');
  };
  reader.readAsDataURL(f);
}

async function submitReceipt() {
  if (!_file) return;
  const tid = await getDriverTenantId();
  if (!tid) { alert('فشل تحديد النشاط — لازم المدير يدعوك بإيميلك أو يضيفك للفريق'); return; }
  const amount = parseFloat(document.getElementById('capAmount').value) || null;
  const note = document.getElementById('capNote').value.trim() || null;

  setBtn('submitBtn', true);
  try {
    // Upload to storage
    const ts = Date.now();
    const path = `${tid}/driver-receipts/${ts}-${_file.name.replace(/\s+/g,'_')}`;
    const { error: upErr } = await sb.storage.from('receipts').upload(path, _file, { upsert: false });
    if (upErr) throw upErr;
    const { data: pub } = sb.storage.from('receipts').getPublicUrl(path);

    // Insert pending expense
    const { error: insErr } = await sb.from('expenses').insert({
      tenant_id:        tid,
      amount:           amount || 0,
      description:      note || 'فاتورة من تصوير سواق',
      category:         'pending_review',
      expense_date:     new Date().toISOString().slice(0,10),
      payment_status:   'unpaid',
      receipt_url:      pub.publicUrl,
      source:           'driver_quick_capture',
    });
    if (insErr) throw insErr;

    document.getElementById('previewPanel').classList.remove('on');
    document.getElementById('donePanel').classList.add('on');
    await loadHistory();
  } catch (e) {
    alert('فشل الرفع: ' + (e.message || 'خطأ'));
  } finally {
    setBtn('submitBtn', false, 'رفع الفاتورة ✓');
  }
}

function resetCapture() {
  _file = null;
  document.getElementById('filePick').value = '';
  document.getElementById('filePickGallery').value = '';
  document.getElementById('capAmount').value = '';
  document.getElementById('capNote').value = '';
  document.getElementById('previewPanel').classList.remove('on');
  document.getElementById('donePanel').classList.remove('on');
  document.getElementById('mainPanel').classList.remove('hidden');
}

async function getDriverTenantId() {
  const { data: tu } = await sb.from('tenant_users').select('tenant_id').limit(1).maybeSingle();
  return tu?.tenant_id || null;
}

async function loadHistory() {
  const tid = await getDriverTenantId();
  if (!tid) return;
  const { data } = await sb.from('expenses')
    .select('id, description, amount, receipt_url, expense_date, category, payment_status, created_at')
    .eq('tenant_id', tid)
    .eq('source', 'driver_quick_capture')
    .order('created_at', { ascending: false }).limit(8);

  const list = data || [];
  document.getElementById('histCount').textContent = list.length;
  if (!list.length) {
    document.getElementById('histList').innerHTML = `<div style="text-align:center;padding:14px;color:rgba(21,94,95,.5);font-size:12px">لا توجد رفعات سابقة</div>`;
    return;
  }
  document.getElementById('histList').innerHTML = list.map(e => {
    const status = e.category === 'pending_review' ? 'pending' : 'approved';
    const statusLabel = status === 'pending' ? '⏳ بانتظار' : '✓ معتمدة';
    const time = new Date(e.created_at).toLocaleString('ar-SA-u-nu-latn', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    return `<div class="history-item">
      <img class="history-thumb" src="${e.receipt_url || ''}" alt="" onerror="this.style.background='#eee'">
      <div class="history-info">
        <div style="font-weight:700;color:#155e5f">${e.description || '—'}</div>
        <div class="history-time">${time}</div>
      </div>
      ${e.amount ? `<div style="font-weight:700;color:#155e5f;direction:ltr">${(+e.amount).toFixed(2)}</div>` : ''}
      <span class="history-status ${status}">${statusLabel}</span>
    </div>`;
  }).join('');
}

async function logout() {
  if (!confirm('خروج من الحساب؟')) return;
  await sb.auth.signOut();
  location.reload();
}

// ── Boot: if already signed in, skip to capture
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    _userInfo = session.user;
    _phone = session.user.phone || '';
    showCaptureUI();
  }
})();
</script>
